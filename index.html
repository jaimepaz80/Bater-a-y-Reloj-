<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Sistema</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #FFFF00;
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        #battery {
            font-size: 35vw;
            line-height: 0.9;
            text-shadow: 2px 2px 0px #000;
        }
        #status {
            font-size: 8vw;
            margin-bottom: 1vh;
            text-transform: uppercase;
        }
        #estimate {
            font-size: 6vw;
            color: #AAAAAA;
            margin-bottom: 2vh;
        }
        #time {
            font-size: 12vw;
            color: #FFFFFF;
        }
        #date {
            font-size: 6vw;
            color: #00FF00;
            margin-top: 1vh;
            text-transform: uppercase;
        }
        .error {
            font-size: 5vw;
            color: #FF0000;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="battery">--%</div>
    <div id="status">--</div>
    <div id="estimate">--</div>
    <div id="time">--:--:--</div>
    <div id="date">--/--/----</div>

    <script>
        function updateTime() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const dateOpts = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' };
            const dateStr = now.toLocaleDateString('es-ES', dateOpts);
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('date').textContent = dateStr;
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                
                function formatTime(secs) {
                    if (!isFinite(secs)) return "Calculando...";
                    if (secs <= 0) return "0h 0m";
                    const h = Math.floor(secs / 3600);
                    const m = Math.floor((secs % 3600) / 60);
                    return `${h}h ${m}m`;
                }

                function updateBatteryInfo() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('battery').textContent = level + '%';
                    
                    const statusDiv = document.getElementById('status');
                    const estimateDiv = document.getElementById('estimate');
                    
                    if (battery.charging) {
                        statusDiv.textContent = 'CARGANDO';
                        statusDiv.style.color = '#00FF00';
                        
                        const chargeTime = battery.chargingTime;
                        if (isFinite(chargeTime) && chargeTime < 86400) {
                            estimateDiv.textContent = `Tiempo al 100%: ${formatTime(chargeTime)}`;
                        } else {
                            estimateDiv.textContent = "Tiempo al 100%: Calculando/Bloqueado...";
                        }
                    } else {
                        statusDiv.textContent = 'DESCARGANDO';
                        statusDiv.style.color = '#FF9900';
                        
                        const totalSecs = battery.dischargingTime;
                        if (level > 10 && isFinite(totalSecs)) {
                            const timeTo10 = (totalSecs / level) * (level - 10);
                            estimateDiv.textContent = `Tiempo al 10%: ${formatTime(timeTo10)}`;
                        } else if (level <= 10) {
                            estimateDiv.textContent = "Batería al 10% o menos";
                        } else {
                            estimateDiv.textContent = "Tiempo al 10%: Calculando...";
                        }
                    }
                }
                
                updateBatteryInfo();
                battery.addEventListener('levelchange', updateBatteryInfo);
                battery.addEventListener('chargingchange', updateBatteryInfo);
                battery.addEventListener('chargingtimechange', updateBatteryInfo);
                battery.addEventListener('dischargingtimechange', updateBatteryInfo);
            });
        } else {
            document.getElementById('battery').innerHTML = '<div class="error">API NO SOPORTADA</div>';
            document.getElementById('status').style.display = 'none';
            document.getElementById('estimate').style.display = 'none';
        }
    </script>
</body>
</html>
